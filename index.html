    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ViralMind",
      "url": "https://viralmind.com",
      "description": "The world's #1 viral quiz platform. Discover yourself through personality tests, trivia, and more. 50M+ users, 195 countries.",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web",
      "inLanguage": ["en", "tr", "es", "fr", "de", "pt"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "284000",
        "bestRating": "5"
      },
      "author": {
        "@type": "Organization",
        "name": "ViralMind",
        "url": "https://viralmind.com"
      }
    }
    </script>
    
    <!-- Structured Data - FAQ (Google loves this for rich snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ViralMind free?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes! You can take unlimited quizzes for free. Premium features like ad-free experience and custom quiz creation are available with Pro subscription starting at $9.99/month." }
        },
        {
          "@type": "Question",
          "name": "What types of quizzes are available?",
          "acceptedAnswer": { "@type": "Answer", "text": "ViralMind offers 12+ quiz categories including personality tests, love language quizzes, IQ tests, career path analysis, spirit animal quizzes, psychology tests, pop culture quizzes, and more. All quizzes are available in 6 languages." }
        },
        {
          "@type": "Question",
          "name": "Can I create my own quiz?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes! ViralMind has a built-in quiz creator where you can build personality quizzes or trivia quizzes with custom questions, options, and results. Your quiz will be published in the Community section for everyone to play." }
        },
        {
          "@type": "Question",
          "name": "How many people use ViralMind?",
          "acceptedAnswer": { "@type": "Answer", "text": "ViralMind has over 50 million active users across 195 countries, with more than 5 million daily quiz plays and 250,000+ quizzes created." }
        }
      ]
    }
    </script>
    
    <!-- Structured Data - BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://viralmind.com" },
        { "@type": "ListItem", "position": 2, "name": "Quizzes", "item": "https://viralmind.com/quizzes" },
        { "@type": "ListItem", "position": 3, "name": "Leaderboard", "item": "https://viralmind.com/leaderboard" },
        { "@type": "ListItem", "position": 4, "name": "Create Quiz", "item": "https://viralmind.com/create" }
      ]
    }
    </script>
